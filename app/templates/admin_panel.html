<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}

/* Header */
header{background:#1e293b;padding:.8rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155;position:sticky;top:0;z-index:100}
header h1{font-size:1.15rem;color:#38bdf8}
header .right{display:flex;align-items:center;gap:1rem}
header .user{font-size:.85rem;color:#94a3b8}
.btn-logout{background:#ef4444;color:#fff;border:none;padding:.4rem .9rem;border-radius:6px;cursor:pointer;font-size:.8rem}
.btn-logout:hover{background:#dc2626}

/* Tabs */
.tabs{display:flex;gap:0;background:#1e293b;border-bottom:1px solid #334155}
.tab{padding:.7rem 1.5rem;cursor:pointer;font-size:.9rem;color:#94a3b8;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:#e2e8f0}
.tab.active{color:#38bdf8;border-bottom-color:#38bdf8}

/* Main */
.container{max-width:960px;margin:0 auto;padding:1.5rem}
.section{display:none}
.section.active{display:block}

/* Search bar */
.search-bar{display:flex;gap:.5rem;margin-bottom:1.2rem}
.search-bar input{flex:1;padding:.6rem .9rem;border:1px solid #334155;border-radius:8px;background:#0f172a;color:#e2e8f0;font-size:.9rem;outline:none}
.search-bar input:focus{border-color:#38bdf8}
.search-bar button{padding:.6rem 1.2rem;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.9rem}
.search-bar button:hover{background:#1d4ed8}

/* Table */
table{width:100%;border-collapse:collapse;margin-bottom:1rem}
th,td{text-align:left;padding:.6rem .8rem;border-bottom:1px solid #1e293b}
th{background:#1e293b;color:#94a3b8;font-size:.8rem;text-transform:uppercase;letter-spacing:.5px}
tr:hover{background:#1e293b}

/* Buttons */
.btn{padding:.35rem .7rem;border:none;border-radius:6px;cursor:pointer;font-size:.78rem;transition:background .2s}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-success{background:#22c55e;color:#fff}
.btn-success:hover{background:#16a34a}
.btn-warning{background:#f59e0b;color:#fff}
.btn-warning:hover{background:#d97706}
.btn-secondary{background:#475569;color:#fff}
.btn-secondary:hover{background:#334155}
.btn-info{background:#0ea5e9;color:#fff}
.btn-info:hover{background:#0284c7}

/* Pagination */
.pagination{display:flex;justify-content:center;gap:.5rem;margin-top:1rem}
.pagination button{padding:.4rem .8rem;background:#334155;color:#e2e8f0;border:none;border-radius:6px;cursor:pointer;font-size:.8rem}
.pagination button:hover{background:#475569}
.pagination button:disabled{opacity:.4;cursor:default}
.pagination span{padding:.4rem .5rem;font-size:.8rem;color:#94a3b8}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:200;justify-content:center;align-items:center}
.modal-overlay.visible{display:flex}
.modal{background:#1e293b;border-radius:12px;padding:1.5rem;width:90%;max-width:700px;max-height:85vh;overflow-y:auto}
.modal h2{font-size:1.1rem;color:#38bdf8;margin-bottom:1rem}
.modal .close-btn{float:right;background:none;border:none;color:#94a3b8;font-size:1.3rem;cursor:pointer}
.modal .close-btn:hover{color:#e2e8f0}
.form-group{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.9rem}
.form-group label{font-size:.82rem;color:#94a3b8}
.form-group input,.form-group textarea,.form-group select{padding:.6rem .8rem;border:1px solid #334155;border-radius:8px;background:#0f172a;color:#e2e8f0;font-size:.9rem;outline:none}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:#38bdf8}
.form-group textarea{resize:vertical;min-height:70px}
.form-note{font-size:.78rem;color:#64748b;margin-top:-.25rem;margin-bottom:.7rem}
.modal-actions{display:flex;justify-content:flex-end;gap:.6rem;margin-top:1rem}

.card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:1rem;margin-bottom:1rem}
.card h3{font-size:1rem;color:#38bdf8;margin-bottom:.9rem}

/* Post detail */
.post-detail{margin-bottom:1.5rem;padding:1rem;background:#0f172a;border-radius:8px}
.post-detail .meta{font-size:.8rem;color:#94a3b8;margin-bottom:.5rem}
.post-detail .text{font-size:.95rem;line-height:1.5}
.post-media-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.6rem;margin-top:.8rem}
.post-media-item{background:#020617;border:1px solid #334155;border-radius:8px;overflow:hidden}
.post-media-item img,.post-media-item video{display:block;width:100%;max-height:240px;object-fit:cover;background:#000}
.post-media-item .meta{padding:.45rem .55rem;font-size:.72rem;color:#94a3b8;word-break:break-all}

.comment-item{padding:.6rem .8rem;border-left:2px solid #334155;margin:.5rem 0;background:#0f172a;border-radius:0 8px 8px 0}
.comment-item .meta{font-size:.75rem;color:#94a3b8;margin-bottom:.3rem}
.comment-item .text{font-size:.88rem}
.comment-item .actions{margin-top:.4rem}

/* Toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.7rem 1.2rem;border-radius:8px;color:#fff;font-size:.85rem;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.success{background:#16a34a}
.toast.error{background:#dc2626}

/* Loading */
.loading{text-align:center;padding:2rem;color:#94a3b8}

/* Empty */
.empty{text-align:center;padding:2rem;color:#64748b}

/* Badge */
.badge{display:inline-block;padding:.15rem .5rem;border-radius:4px;font-size:.7rem;font-weight:600}
.badge-admin{background:#7c3aed;color:#fff}
.badge-user{background:#334155;color:#94a3b8}
.badge-success{background:#166534;color:#dcfce7}
.badge-warning{background:#78350f;color:#fef3c7}
.badge-danger{background:#7f1d1d;color:#fecaca}

/* Confirm dialog */
.confirm-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:250;justify-content:center;align-items:center}
.confirm-overlay.visible{display:flex}
.confirm-box{background:#1e293b;border-radius:12px;padding:1.5rem;width:380px;text-align:center}
.confirm-box p{margin-bottom:1.2rem;font-size:.95rem}
.confirm-box .btns{display:flex;gap:.8rem;justify-content:center}
.confirm-box .btns button{padding:.5rem 1.2rem;border-radius:8px;border:none;cursor:pointer;font-size:.88rem}
</style>
</head>
<body>

<header>
  <h1>⚙️ Admin Panel</h1>
  <div class="right">
    <span class="user" id="adminUser"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="users" onclick="switchTab('users')">Users</div>
  <div class="tab" data-tab="posts" onclick="switchTab('posts')">Posts</div>
  <div class="tab" data-tab="reports" onclick="switchTab('reports')">Reports</div>
  <div class="tab" data-tab="updates" onclick="switchTab('updates')">App Updates</div>
</div>

<div class="container">
  <!-- Users Section -->
  <div class="section active" id="sec-users">
    <div class="search-bar">
      <input type="text" id="userSearch" placeholder="Search users by username…" onkeydown="if(event.key==='Enter')searchUsers()">
      <button onclick="searchUsers()">Search</button>
    </div>
    <div id="usersTable"></div>
    <div class="pagination" id="usersPagination"></div>
  </div>

  <!-- Posts Section -->
  <div class="section" id="sec-posts">
    <div class="search-bar">
      <input type="text" id="postSearch" placeholder="Search posts by text…" onkeydown="if(event.key==='Enter')searchPosts()">
      <button onclick="searchPosts()">Search</button>
    </div>
    <div id="postsTable"></div>
    <div class="pagination" id="postsPagination"></div>
  </div>

  <!-- Reports Section -->
  <div class="section" id="sec-reports">
    <div class="search-bar">
      <select id="reportStatus" style="padding:.6rem .8rem;border:1px solid #334155;border-radius:8px;background:#0f172a;color:#e2e8f0;">
        <option value="">All statuses</option>
        <option value="pending">Pending</option>
        <option value="handled">Handled</option>
      </select>
      <select id="reportType" style="padding:.6rem .8rem;border:1px solid #334155;border-radius:8px;background:#0f172a;color:#e2e8f0;">
        <option value="">All types</option>
        <option value="scam">Scam</option>
        <option value="unethical_content">Unethical Content</option>
        <option value="violence">Violence</option>
        <option value="spam">Spam</option>
        <option value="false_information">False Information</option>
      </select>
      <button onclick="searchReports()">Apply</button>
    </div>
    <div id="reportsTable"></div>
    <div class="pagination" id="reportsPagination"></div>
  </div>

  <!-- App Updates Section -->
  <div class="section" id="sec-updates">
    <div class="card">
      <h3>Update Settings</h3>
      <div class="form-group">
        <label for="updateForceBelow">Force Update Below</label>
        <input type="text" id="updateForceBelow" placeholder="0.3.0">
      </div>
      <div class="form-group">
        <label for="updateOptionalBelow">Optional Update Below (inclusive)</label>
        <input type="text" id="updateOptionalBelow" placeholder="0.6.0">
      </div>
      <div class="form-group">
        <label for="updateLatestVersion">Latest Version</label>
        <input type="text" id="updateLatestVersion" placeholder="0.7.0">
      </div>
      <div class="form-group">
        <label for="updateDownloadUrl">Download URL</label>
        <input type="text" id="updateDownloadUrl" placeholder="/download/app or https://example.com/app-release.apk">
      </div>
      <div class="form-group">
        <label for="forceTitle">Force Update Title</label>
        <input type="text" id="forceTitle" placeholder="Update required">
      </div>
      <div class="form-group">
        <label for="forceMessage">Force Update Message</label>
        <textarea id="forceMessage" placeholder="Please update to continue using the app."></textarea>
      </div>
      <div class="form-group">
        <label for="optionalTitle">Optional Update Title</label>
        <input type="text" id="optionalTitle" placeholder="Update available">
      </div>
      <div class="form-group">
        <label for="optionalMessage">Optional Update Message</label>
        <textarea id="optionalMessage" placeholder="A newer version is available."></textarea>
      </div>
      <div class="modal-actions" style="margin-top:0">
        <button class="btn btn-success" onclick="saveUpdateSettings()">Save Settings</button>
      </div>
    </div>
  </div>
</div>

<!-- Post Detail Modal -->
<div class="modal-overlay" id="postModal">
  <div class="modal">
    <button class="close-btn" onclick="closePostModal()">&times;</button>
    <h2>Post Detail</h2>
    <div id="postDetailContent"><div class="loading">Loading…</div></div>
  </div>
</div>

<!-- Edit Credentials Modal -->
<div class="modal-overlay" id="credentialsModal">
  <div class="modal" style="max-width:520px">
    <button class="close-btn" onclick="closeCredentialModal()">&times;</button>
    <h2>Edit User Credentials</h2>
    <div class="form-group">
      <label for="credUsername">Username</label>
      <input type="text" id="credUsername" autocomplete="off">
    </div>
    <div class="form-group">
      <label for="credPassword">New Password (optional)</label>
      <input type="password" id="credPassword" autocomplete="new-password" placeholder="Leave empty to keep current password">
    </div>
    <div class="form-note">Changing password is optional. If set, a new hash will be stored.</div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeCredentialModal()">Cancel</button>
      <button class="btn btn-success" onclick="saveCredentialChanges()">Save</button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirmDialog">
  <div class="confirm-box">
    <p id="confirmMessage">Are you sure?</p>
    <div class="btns">
      <button class="btn btn-danger" id="confirmYes">Yes, do it</button>
      <button class="btn btn-secondary" onclick="closeConfirm()">Cancel</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const TOKEN_KEY = 'admin_token';
const USER_KEY = 'admin_user';
let token = localStorage.getItem(TOKEN_KEY);
let currentTab = 'users';
let usersPage = 1, postsPage = 1, reportsPage = 1;
let editingCredentialUserId = null;
let editingCredentialOriginalUsername = '';

function api(path, opts = {}) {
  const headers = { ...(opts.headers || {}) };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  return fetch('/admin' + path, { ...opts, headers });
}

function logout() {
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(USER_KEY);
  window.location.href = '/admin/login';
}

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  setTimeout(() => el.className = 'toast', 2500);
}

// ── Auth guard ──────────────────────────────
(async function init() {
  if (!token) { window.location.href = '/admin/login'; return; }
  document.getElementById('adminUser').textContent = localStorage.getItem(USER_KEY) || '';
  try {
    const res = await api('/api/me');
    if (!res.ok) throw new Error();
  } catch {
    logout();
    return;
  }
  searchUsers();
})();

// ── Tabs ────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + tab));
  if (tab === 'users') searchUsers();
  else if (tab === 'posts') searchPosts();
  else if (tab === 'reports') searchReports();
  else loadUpdateSettings();
}

// ── Users ───────────────────────────────────
async function searchUsers(page = 1) {
  usersPage = page;
  const q = document.getElementById('userSearch').value.trim();
  const res = await api('/api/users?q=' + encodeURIComponent(q) + '&page=' + page + '&limit=20');
  if (!res.ok) { toast('Failed to load users', 'error'); return; }
  const data = await res.json();
  renderUsersTable(data);
}

function renderUsersTable(data) {
  const { users, total, page, limit } = data;
  const container = document.getElementById('usersTable');
  if (!users.length) { container.innerHTML = '<div class="empty">No users found</div>'; document.getElementById('usersPagination').innerHTML = ''; return; }

  let html = '<table><thead><tr><th>ID</th><th>Username</th><th>Name</th><th>Role</th><th>Actions</th></tr></thead><tbody>';
  for (const u of users) {
    const badge = u.is_admin ? '<span class="badge badge-admin">Admin</span>' : '<span class="badge badge-user">User</span>';
    const usernameArg = JSON.stringify(u.username || '');
    const promoteBtn = u.is_admin
      ? `<button class="btn btn-warning" onclick="demoteUser(${u.id},'${esc(u.username)}')">Demote</button>`
      : `<button class="btn btn-success" onclick="promoteUser(${u.id},'${esc(u.username)}')">Promote</button>`;
    const credentialBtn = `<button class="btn btn-info" onclick='openCredentialModal(${u.id}, ${usernameArg})'>Edit Creds</button>`;
    html += `<tr>
      <td>${u.id}</td>
      <td>${esc(u.username)}</td>
      <td>${esc(u.name)}</td>
      <td>${badge}</td>
      <td>${credentialBtn} ${promoteBtn} <button class="btn btn-danger" onclick="deleteUser(${u.id},'${esc(u.username)}')">Delete</button></td>
    </tr>`;
  }
  html += '</tbody></table>';
  container.innerHTML = html;

  renderPagination('usersPagination', page, limit, total, searchUsers);
}

function promoteUser(id, name) {
  confirm_action(`Promote <b>${esc(name)}</b> to admin?`, async () => {
    const res = await api('/api/users/' + id + '/promote', { method: 'POST' });
    if (res.ok) { toast(name + ' promoted'); searchUsers(usersPage); }
    else { const d = await res.json(); toast(d.error || 'Failed', 'error'); }
  });
}

function demoteUser(id, name) {
  confirm_action(`Remove admin from <b>${esc(name)}</b>?`, async () => {
    const res = await api('/api/users/' + id + '/demote', { method: 'POST' });
    if (res.ok) { toast(name + ' demoted'); searchUsers(usersPage); }
    else { const d = await res.json(); toast(d.error || 'Failed', 'error'); }
  });
}

function deleteUser(id, name) {
  confirm_action(`<b>Delete user ${esc(name)}</b> and all their data? This cannot be undone.`, async () => {
    const res = await api('/api/users/' + id, { method: 'DELETE' });
    if (res.ok) { toast('User deleted'); searchUsers(usersPage); }
    else { const d = await res.json(); toast(d.error || 'Failed', 'error'); }
  });
}

function openCredentialModal(userId, currentUsername) {
  editingCredentialUserId = userId;
  editingCredentialOriginalUsername = String(currentUsername || '');
  document.getElementById('credUsername').value = editingCredentialOriginalUsername;
  document.getElementById('credPassword').value = '';
  document.getElementById('credentialsModal').classList.add('visible');
}

function closeCredentialModal() {
  editingCredentialUserId = null;
  editingCredentialOriginalUsername = '';
  document.getElementById('credentialsModal').classList.remove('visible');
}

async function saveCredentialChanges() {
  if (!editingCredentialUserId) {
    toast('No selected user', 'error');
    return;
  }

  const username = document.getElementById('credUsername').value.trim();
  const password = document.getElementById('credPassword').value;

  if (!username) {
    toast('Username cannot be empty', 'error');
    return;
  }

  const payload = {};
  if (username !== editingCredentialOriginalUsername) payload.username = username;
  if (password.trim()) payload.password = password;

  if (!Object.keys(payload).length) {
    toast('No changes to save', 'error');
    return;
  }

  const res = await api('/api/users/' + editingCredentialUserId + '/credentials', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });

  const data = await res.json().catch(() => ({}));
  if (res.ok) {
    closeCredentialModal();
    toast(data.message || 'User credentials updated');
    searchUsers(usersPage);
  } else {
    toast(data.error || 'Failed to update credentials', 'error');
  }
}

// ── Posts ───────────────────────────────────
async function searchPosts(page = 1) {
  postsPage = page;
  const q = document.getElementById('postSearch').value.trim();
  const res = await api('/api/posts?q=' + encodeURIComponent(q) + '&page=' + page + '&limit=20');
  if (!res.ok) { toast('Failed to load posts', 'error'); return; }
  const data = await res.json();
  renderPostsTable(data);
}

function renderPostsTable(data) {
  const { posts, total, page, limit } = data;
  const container = document.getElementById('postsTable');
  if (!posts.length) { container.innerHTML = '<div class="empty">No posts found</div>'; document.getElementById('postsPagination').innerHTML = ''; return; }

  let html = '<table><thead><tr><th>ID</th><th>Author</th><th>Text</th><th>Visibility</th><th>Date</th><th>Actions</th></tr></thead><tbody>';
  for (const p of posts) {
    const short = p.text.length > 80 ? p.text.slice(0, 80) + '…' : p.text;
    const date = new Date(p.created_at).toLocaleDateString();
    const visibility = p.followers_only
      ? '<span class="badge badge-warning">Followers only</span>'
      : '<span class="badge badge-success">Public</span>';
    const hidden = p.is_hidden ? ' <span class="badge badge-danger">Hidden</span>' : '';
    html += `<tr>
      <td>${p.id}</td>
      <td>${esc(p.author)}</td>
      <td>${esc(short)}</td>
      <td>${visibility}${hidden}</td>
      <td>${date}</td>
      <td>
        <button class="btn btn-info" onclick="viewPost(${p.id})">View</button>
        <button class="btn btn-danger" onclick="deletePost(${p.id})">Delete</button>
      </td>
    </tr>`;
  }
  html += '</tbody></table>';
  container.innerHTML = html;

  renderPagination('postsPagination', page, limit, total, searchPosts);
}

function deletePost(id) {
  confirm_action('Delete this post and all its comments? This cannot be undone.', async () => {
    const res = await api('/api/posts/' + id, { method: 'DELETE' });
    if (res.ok) { toast('Post deleted'); searchPosts(postsPage); }
    else { const d = await res.json(); toast(d.error || 'Failed', 'error'); }
  });
}

// ── Reports ─────────────────────────────────
async function searchReports(page = 1) {
  reportsPage = page;
  const status = document.getElementById('reportStatus').value;
  const reportType = document.getElementById('reportType').value;
  const qs = new URLSearchParams({
    page: String(page),
    limit: '20',
  });
  if (status) qs.set('status', status);
  if (reportType) qs.set('report_type', reportType);

  const res = await api('/api/reports?' + qs.toString());
  if (!res.ok) { toast('Failed to load reports', 'error'); return; }
  const data = await res.json();
  renderReportsTable(data);
}

function reportTypeLabel(raw) {
  switch (raw) {
    case 'scam': return 'Scam';
    case 'unethical_content': return 'Unethical Content';
    case 'violence': return 'Violence';
    case 'spam': return 'Spam';
    case 'false_information': return 'False Information';
    default: return raw || '-';
  }
}

function renderReportsTable(data) {
  const { reports, total, page, limit } = data;
  const container = document.getElementById('reportsTable');

  if (!reports.length) {
    container.innerHTML = '<div class="empty">No reports found</div>';
    document.getElementById('reportsPagination').innerHTML = '';
    return;
  }

  let html = '<table><thead><tr><th>ID</th><th>Type</th><th>Reporter</th><th>Post</th><th>Status</th><th>Description</th><th>Actions</th></tr></thead><tbody>';
  for (const r of reports) {
    const reporter = r.reporter?.username || '-';
    const postId = r.post?.id;
    const postIdLabel = postId ? ('#' + postId) : 'deleted';
    const status = r.status || '-';
    const description = r.description || '-';
    const actions = [];
    if (postId) {
      actions.push(`<button class="btn btn-info" onclick="viewPost(${postId})">View Post</button>`);
    }
    if (status === 'pending') {
      actions.push(`<button class="btn btn-secondary" onclick="handleReport(${r.id}, 'dismiss')">Dismiss</button>`);
      actions.push(`<button class="btn btn-warning" onclick="handleReport(${r.id}, 'delete_post')">Delete Post</button>`);
      actions.push(`<button class="btn btn-danger" onclick="handleReport(${r.id}, 'delete_account')">Delete Account</button>`);
    } else {
      actions.push(`<span class="badge badge-user">${esc(r.admin_decision || 'handled')}</span>`);
    }

    html += `<tr>
      <td>${r.id}</td>
      <td>${esc(reportTypeLabel(r.report_type))}</td>
      <td>${esc(reporter)}</td>
      <td>${esc(postIdLabel)}</td>
      <td>${esc(status)}</td>
      <td>${esc(description.length > 90 ? description.slice(0, 90) + '…' : description)}</td>
      <td>${actions.join(' ')}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  container.innerHTML = html;

  renderPagination('reportsPagination', page, limit, total, searchReports);
}

function handleReport(reportId, decision) {
  const labels = {
    dismiss: 'dismiss this report',
    delete_post: 'delete the reported post for one week (soft delete)',
    delete_account: 'delete the reported account for one week (soft delete)',
  };

  const actionLabel = labels[decision] || decision;
  confirm_action(`Are you sure you want to <b>${esc(actionLabel)}</b>?`, async () => {
    const note = window.prompt('Optional admin note (max 255 chars):', '') ?? '';
    const payload = { decision };
    if (note.trim()) payload.admin_note = note.trim().slice(0, 255);

    const res = await api('/api/reports/' + reportId + '/handle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (res.ok) {
      toast('Report handled');
      searchReports(reportsPage);
      if (currentTab === 'posts') searchPosts(postsPage);
    } else {
      const d = await res.json();
      toast(d.error || 'Failed', 'error');
    }
  });
}

// ── App Updates ───────────────────────────
async function loadUpdateSettings() {
  const res = await api('/api/app-update/settings');
  if (!res.ok) {
    toast('Failed to load update settings', 'error');
    return;
  }
  const data = await res.json();
  const settings = data.settings || {};
  document.getElementById('updateForceBelow').value = settings.force_update_below || '';
  document.getElementById('updateOptionalBelow').value = settings.optional_update_below || '';
  document.getElementById('updateLatestVersion').value = settings.latest_version || '';
  document.getElementById('updateDownloadUrl').value = settings.download_url || '/download/app';
  document.getElementById('forceTitle').value = settings.force_title || '';
  document.getElementById('forceMessage').value = settings.force_message || '';
  document.getElementById('optionalTitle').value = settings.optional_title || '';
  document.getElementById('optionalMessage').value = settings.optional_message || '';
}

async function saveUpdateSettings() {
  const payload = {
    force_update_below: document.getElementById('updateForceBelow').value.trim(),
    optional_update_below: document.getElementById('updateOptionalBelow').value.trim(),
    latest_version: document.getElementById('updateLatestVersion').value.trim(),
    download_url: document.getElementById('updateDownloadUrl').value.trim(),
    force_title: document.getElementById('forceTitle').value.trim(),
    force_message: document.getElementById('forceMessage').value.trim(),
    optional_title: document.getElementById('optionalTitle').value.trim(),
    optional_message: document.getElementById('optionalMessage').value.trim(),
  };

  const res = await api('/api/app-update/settings', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  const data = await res.json().catch(() => ({}));
  if (res.ok) {
    toast('Update settings saved');
    loadUpdateSettings();
  } else {
    toast(data.error || 'Failed to save settings', 'error');
  }
}

// ── Post Detail Modal ──────────────────────
async function viewPost(id) {
  document.getElementById('postModal').classList.add('visible');
  document.getElementById('postDetailContent').innerHTML = '<div class="loading">Loading…</div>';
  const res = await api('/api/posts/' + id);
  if (!res.ok) { document.getElementById('postDetailContent').innerHTML = '<div class="empty">Failed to load</div>'; return; }
  const data = await res.json();
  renderPostDetail(data);
}

function renderPostDetail(data) {
  const { post, comments } = data;
  const visibility = post.followers_only ? 'Followers only' : 'Public';
  const hidden = post.is_hidden ? ' · Hidden by moderation' : '';
  let html = `<div class="post-detail">
    <div class="meta">By <b>${esc(post.author)}</b> · ${new Date(post.created_at).toLocaleString()} · ID: ${post.id} · ${visibility}${hidden}</div>
    <div class="text">${esc(post.text)}</div>
  </div>`;

  const media = Array.isArray(post.media) ? post.media : [];
  if (media.length) {
    html += '<h3 style="margin-bottom:.7rem;font-size:.95rem;color:#94a3b8">Media</h3>';
    html += '<div class="post-media-grid">';
    for (const m of media) {
      const mediaUrl = esc(m.url || '');
      const mimeType = (m.mime_type || '').toLowerCase();
      const isVideo = mimeType.startsWith('video/');
      html += `<div class="post-media-item">`;
      if (mediaUrl) {
        html += isVideo
          ? `<video controls preload="metadata" src="${mediaUrl}"></video>`
          : `<img src="${mediaUrl}" loading="lazy" alt="Post media ${m.id}">`;
      } else {
        html += '<div class="empty" style="padding:1rem">Unavailable media</div>';
      }
      html += `<div class="meta">${esc(m.mime_type || 'unknown')} · ${esc(m.object_name || '')}</div>`;
      html += '</div>';
    }
    html += '</div>';
  }

  html += `<h3 style="margin-bottom:.7rem;font-size:.95rem;color:#94a3b8">Comments (${comments.length})</h3>`;
  if (!comments.length) {
    html += '<div class="empty">No comments</div>';
  } else {
    for (const c of comments) {
      const indent = c.parent_id ? 'margin-left:1.5rem;' : '';
      html += `<div class="comment-item" style="${indent}">
        <div class="meta"><b>${esc(c.author)}</b> · ${new Date(c.created_at).toLocaleString()} · ID: ${c.id}${c.parent_id ? ' · reply to #' + c.parent_id : ''}</div>
        <div class="text">${esc(c.text)}</div>
        <div class="actions"><button class="btn btn-danger" onclick="deleteComment(${c.id}, ${post.id})">Delete</button></div>
      </div>`;
    }
  }
  document.getElementById('postDetailContent').innerHTML = html;
}

async function deleteComment(commentId, postId) {
  confirm_action('Delete this comment and its replies?', async () => {
    const res = await api('/api/comments/' + commentId, { method: 'DELETE' });
    if (res.ok) { toast('Comment deleted'); viewPost(postId); }
    else { const d = await res.json(); toast(d.error || 'Failed', 'error'); }
  });
}

function closePostModal() {
  document.getElementById('postModal').classList.remove('visible');
}

// ── Pagination ─────────────────────────────
function renderPagination(elId, page, limit, total, callback) {
  const totalPages = Math.ceil(total / limit);
  const el = document.getElementById(elId);
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  let html = `<button ${page <= 1 ? 'disabled' : ''} onclick="(${callback.name})(${page - 1})">← Prev</button>`;
  html += `<span>Page ${page} of ${totalPages} (${total} total)</span>`;
  html += `<button ${page >= totalPages ? 'disabled' : ''} onclick="(${callback.name})(${page + 1})">Next →</button>`;
  el.innerHTML = html;
}

// ── Confirm Dialog ─────────────────────────
let confirmCallback = null;
function confirm_action(msg, cb) {
  confirmCallback = cb;
  document.getElementById('confirmMessage').innerHTML = msg;
  document.getElementById('confirmDialog').classList.add('visible');
}
function closeConfirm() {
  confirmCallback = null;
  document.getElementById('confirmDialog').classList.remove('visible');
}
document.getElementById('confirmYes').addEventListener('click', async () => {
  if (confirmCallback) { await confirmCallback(); }
  closeConfirm();
});

// ── Utils ──────────────────────────────────
function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
</script>
